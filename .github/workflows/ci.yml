---
name: CI

'on':
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install formatter
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc' '*.cxx')
          clang-format --dry-run --Werror "${files[@]}"

  build-test:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - debug
          - nosdbus
          - asan
          - ubsan
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            g++ \
            git \
            libclang-dev \
            libcurl4-openssl-dev \
            libffi-dev \
            libxml2-dev \
            libzstd-dev \
            llvm-dev \
            ninja-build \
            pkg-config \
            python3-pip \
            zlib1g-dev
          python3 -m pip install --user --break-system-packages --upgrade cmake
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake --preset=${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset=${{ matrix.preset }}

      - name: Test
        run: ctest --preset=${{ matrix.preset }}

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install tidy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            g++ \
            git \
            libclang-dev \
            libcurl4-openssl-dev \
            libffi-dev \
            libxml2-dev \
            libzstd-dev \
            llvm-dev \
            ninja-build \
            pkg-config \
            python3-pip \
            zlib1g-dev
          python3 -m pip install --user --break-system-packages --upgrade cmake
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure clang compile database
        run: >
          cmake -S . -B build/tidy -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_SCAN_FOR_MODULES=OFF

      - name: Build generated test wrapper
        run: cmake --build build/tidy --target podman_manager_tests

      - name: Run clang-tidy
        run: |
          clang-tidy -p build/tidy --quiet \
            src/*.cpp \
            examples/*.cpp \
            build/tidy/gentest/podman_manager_tests/tu_0000_podman_manager_tests.gentest.cpp
